name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Release, ad-hoc)
    # Hydra Display targets macOS 26 (Tahoe) and requires the macOS 26 SDK.
    # Use the newest available macOS runner; switch to `macos-26` once GitHub
    # offers it as a hosted image.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcodebuild -showsdks | grep -i macos || true

      - name: Build
        run: |
          xcodebuild \
            -project HydraDisplay.xcodeproj \
            -scheme HydraDisplay \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            clean build

      - name: Package app
        run: |
          APP="build/Build/Products/Release/HydraDisplay.app"
          if [ -d "$APP" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP" HydraDisplay.app.zip
          fi

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: HydraDisplay-app
          path: HydraDisplay.app.zip
          if-no-files-found: ignore
