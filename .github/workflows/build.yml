name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Release, ad-hoc)
    # Hydra Display targets macOS 26 (Tahoe) and uses Liquid Glass APIs that
    # only exist in the macOS 26 SDK (Xcode 26). GitHub's hosted runners don't
    # ship Xcode 26 yet, so this job auto-detects the SDK and skips the build
    # (staying green) until a macOS 26 runner image is available. Switch
    # `runs-on` to `macos-26` once GitHub offers it.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          newest="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "$newest" ]; then
            sudo xcode-select -s "$newest/Contents/Developer"
          fi
          xcodebuild -version || true

      - name: Check for the macOS 26 SDK
        id: sdk
        run: |
          if xcodebuild -showsdks 2>/dev/null | grep -qi "macosx26"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "macOS 26 SDK found — will build."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Build skipped::The macOS 26 SDK (Xcode 26) is not available on this runner yet. Hydra Display requires it for the Liquid Glass APIs, so the build is skipped. Build locally with Xcode 26."
          fi

      - name: Build
        if: steps.sdk.outputs.available == 'true'
        run: |
          xcodebuild \
            -project HydraDisplay.xcodeproj \
            -scheme HydraDisplay \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            clean build

      - name: Run unit tests
        if: steps.sdk.outputs.available == 'true'
        run: |
          xcodebuild \
            -project HydraDisplay.xcodeproj \
            -scheme HydraDisplay \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:HydraDisplayTests \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            test

      - name: Package app
        if: steps.sdk.outputs.available == 'true'
        run: |
          APP="build/Build/Products/Release/HydraDisplay.app"
          if [ -d "$APP" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP" HydraDisplay.app.zip
          fi

      - name: Upload artifact
        if: steps.sdk.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: HydraDisplay-app
          path: HydraDisplay.app.zip
          if-no-files-found: ignore
